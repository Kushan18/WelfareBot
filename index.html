<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grok Scheme Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">Grok Scheme Assistant</h1>
        </header>
        <main id="chat-area" class="chat-area"></main>
        <div class="input-area">
            <input id="text-input" type="text" placeholder="Type a message..." autocomplete="off" />
            <button id="send-btn" aria-label="Send message">▶️</button>
            <button id="voice-btn" aria-label="Voice input">🎤</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
